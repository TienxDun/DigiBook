<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- SEO Meta tags are managed dynamically by React Helmet -->
    <title>DigiBook | Nhà sách Trực tuyến Hiện đại</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Quicksand:wght@300..700&display=swap&subset=vietnamese"
        rel="stylesheet">

    <!-- GoatCounter Analytics (skip localhost) -->
    <script>
        if (!['localhost', '127.0.0.1'].includes(window.location.hostname)) {
            const script = document.createElement('script');
            script.async = true;
            script.src = '//gc.zgo.at/count.js';
            script.dataset.goatcounter = 'https://digibook.goatcounter.com/count';
            document.head.appendChild(script);
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 overflow-x-hidden selection:bg-indigo-100 selection:text-indigo-700">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
